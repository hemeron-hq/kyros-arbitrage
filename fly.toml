app = "kyros-arbitrage"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  ENV = "production"
  PORT = "8090"
  DATABASE_URL = "file:/var/lib/app/app.db"

[mounts]
  source = "kyros_data"
  destination = "/var/lib/app"
  initial_size = "1gb"

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
